{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center align-items-center min-vh-100">

    <div class="col-md-5">

        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

            <!-- HEADER -->

            <div class="text-center text-white p-5"
                 style="
                 background: linear-gradient(
                 135deg,
                 #0d6efd,
                 #6610f2
                 );
                 ">

                <h1 class="fw-bold">

                    Buat Akun Baru

                </h1>

                <p class="mt-3">

                    Daftar untuk mulai jual beli online

                </p>

            </div>

            <!-- BODY -->

            <div class="card-body p-5">

                <h2 class="fw-bold text-center mb-4">

                    Register

                </h2>

                <form method="POST">

                    {% csrf_token %}

                    <!-- USERNAME -->

                    <div class="mb-4">

                        <label class="fw-bold mb-2">

                            Username

                        </label>

                        <input type="text"
                               name="username"
                               class="form-control form-control-lg rounded-pill"
                               placeholder="Masukkan username"
                               required>

                    </div>

                    <!-- EMAIL -->

                    <div class="mb-4">

                        <label class="fw-bold mb-2">

                            Email

                        </label>

                        <input type="email"
                               name="email"
                               class="form-control form-control-lg rounded-pill"
                               placeholder="Masukkan email"
                               required>

                    </div>

                    <!-- PASSWORD -->

                    <div class="mb-4">

                        <label class="fw-bold mb-2">

                            Password

                        </label>

                        <input type="password"
                            name="password1"
                            class="form-control form-control-lg rounded-pill"
                            placeholder="Masukkan password"
                            required>

                    </div>

                    <!-- KONFIRMASI PASSWORD -->

                    <div class="mb-4">

                        <label class="fw-bold mb-2">

                            Konfirmasi Password

                        </label>

                        <input type="password"
                            name="password2"
                            class="form-control form-control-lg rounded-pill"
                            placeholder="Konfirmasi password"
                            required>

                    </div>

                    <!-- ROLE -->

                    <div class="mb-4">

                        <label class="fw-bold mb-2">

                            Daftar Sebagai

                        </label>

                        <select name="role"
                                class="form-select form-select-lg rounded-pill"
                                required>

                            <option value="buyer">

                                Pembeli

                            </option>

                            <option value="seller">

                                Penjual

                            </option>

                        </select>

                    </div>

                    <!-- BUTTON -->

                    <button type="submit"
                            class="btn btn-primary btn-lg w-100 rounded-pill">

                        Register Sekarang

                    </button>

                </form>

                <!-- LOGIN -->

                <div class="text-center mt-4">

                    Sudah punya akun?

                    <a href="{% url 'login' %}"
                       class="fw-bold text-decoration-none">

                        Login disini

                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
