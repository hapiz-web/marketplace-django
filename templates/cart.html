{% extends 'base.html' %}

{% block content %}

<h2>Keranjang Belanja</h2>

<table class="table table-bordered">

<tr>
    <th>Produk</th>
    <th>Harga</th>
    <th>Jumlah</th>
</tr>

{% for item in carts %}

<tr>
    <td>{{ item.product.name }}</td>
    <td>{{ item.product.price }}</td>
    <td>{{ item.quantity }}</td>
</tr>

{% endfor %}

</table>

<h3>Total: Rp {{ total }}</h3>

{% endblock %}
